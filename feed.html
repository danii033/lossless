<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Lossless Feed</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f7f7f7;
        display: flex;
        justify-content: center;
      }

      /* ---------- LAYOUT ---------- */

      .layout {
        display: flex;
        width: 100%;
        max-width: 860px;
        padding: 18px;
        gap: 14px;
        align-items: flex-start;
        box-sizing: border-box;
      }

      /* ---------- LEFT PANEL ---------- */

      .leftPanel {
        width: 180px;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .panelCard {
        background: white;
        border-radius: 16px;
        padding: 16px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      }

      .panelTitle {
        font-size: 16px;
        font-weight: 800;
        color: #4CAF50;
        letter-spacing: 0.5px;
        margin-bottom: 12px;
        opacity: 1;
      }

      /* Add friend search */
      .addFriendBtn {
        width: 100%;
        padding: 8px 10px;
        border-radius: 10px;
        border: 1px solid rgba(0,0,0,0.12);
        background: #f7f7f7;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        text-align: left;
        color: black;
      }

      .addFriendBtn:hover { background: #efefef; }

      .searchPanel {
        display: none;
        margin-top: 10px;
      }

      .searchPanel.open { display: block; }

      .friendSearchInput {
        width: 100%;
        padding: 8px 10px;
        border-radius: 10px;
        border: 1px solid rgba(0,0,0,0.15);
        font-size: 12px;
        outline: none;
        font-family: inherit;
        box-sizing: border-box;
        margin-bottom: 8px;
      }

      .friendSearchInput:focus { border-color: rgba(0,0,0,0.3); }

      .searchResults { display: flex; flex-direction: column; gap: 8px; }

      .searchResultItem {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 13px;
        font-weight: 500;
        padding: 4px 0;
        border-bottom: 1px solid rgba(0,0,0,0.05);
      }

      .searchResultItem:last-child { border-bottom: none; }

      .sendRequestBtn {
        font-size: 11px;
        padding: 5px 12px;
        border-radius: 8px;
        border: none;
        background: black;
        color: white;
        cursor: pointer;
        font-weight: 700;
        white-space: nowrap;
      }

      .sendRequestBtn:disabled {
        background: #e0e0e0;
        color: #999;
        cursor: default;
      }

      /* Friend requests */
      .requestItem {
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 10px 0;
        border-bottom: 1px solid rgba(0,0,0,0.06);
        font-size: 13px;
        font-weight: 500;
      }

      .requestItem:last-child { border-bottom: none; }

      .requestActions { display: flex; gap: 6px; }

      .acceptBtn, .declineBtn {
        flex: 1;
        padding: 6px;
        border-radius: 8px;
        border: none;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
      }

      .acceptBtn  { background: black; color: white; }
      .declineBtn { background: #f2f2f2; color: black; }

      /* Friends list */
      .friendItem {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 13px;
        font-weight: 500;
        padding: 8px 0;
        border-bottom: 1px solid rgba(0,0,0,0.06);
      }

      .friendItem:last-child { border-bottom: none; }

      .removeFriendBtn {
        font-size: 11px;
        padding: 4px 10px;
        border-radius: 8px;
        border: 1px solid rgba(0,0,0,0.12);
        background: white;
        cursor: pointer;
        color: #aaa;
        font-weight: 600;
      }

      .removeFriendBtn:hover { color: red; border-color: rgba(255,0,0,0.3); }

      .emptyPanel {
        font-size: 12px;
        opacity: 0.4;
        text-align: center;
        padding: 8px 0;
      }

      /* ---------- MAIN FEED ---------- */

      .main {
        flex: 1;
        min-width: 0;
        max-width: 620px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        margin-bottom: 14px;
      }

      .brandBlock {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .logo {
        height: 36px;
        width: auto;
        display: block;
      }

      .subtitle {
        font-size: 15px;
        font-weight: 700;
        margin-top: 2px;
        opacity: 0.7;
      }

      .topActions { display: flex; gap: 8px; }

      .emptyState {
        background: white;
        border-radius: 16px;
        padding: 18px;
        text-align: center;
        opacity: 0.7;
        box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      }

      /* ---------- POST CARD ---------- */

      .card {
        background: white;
        width: 100%;
        border-radius: 16px;
        padding: 14px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        margin-bottom: 12px;
        box-sizing: border-box;
      }

      .topline {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 6px;
      }

      .user { font-size: 12px; font-weight: 700; opacity: 0.85; }
      .time { font-size: 12px; opacity: 0.6; white-space: nowrap; }

      .track { font-size: 14px; font-weight: 800; margin-bottom: 6px; }

      .meta { font-size: 12px; opacity: 0.8; margin-bottom: 10px; }

      .link {
        display: inline-block;
        font-size: 12px;
        font-weight: 700;
        text-decoration: none;
        color: black;
        border: 1px solid rgba(0,0,0,0.12);
        padding: 8px 10px;
        border-radius: 12px;
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .pill {
        font-size: 11px;
        opacity: 0.7;
        border: 1px solid rgba(0,0,0,0.12);
        padding: 6px 10px;
        border-radius: 999px;
        white-space: nowrap;
      }

      .actions {
        margin-top: 10px;
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .deleteBtn {
        background: white;
        color: black;
        border: 1px solid rgba(0,0,0,0.12);
        border-radius: 12px;
        padding: 8px 10px;
        font-weight: 700;
        cursor: pointer;
        font-size: 12px;
      }

      .deleteBtn:hover { transform: scale(1.03); }

      /* ---------- COMMENTS ---------- */

      .commentsSection {
        margin-top: 12px;
        border-top: 1px solid rgba(0,0,0,0.06);
        padding-top: 10px;
      }

      .commentList {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 8px;
      }

      .commentItem { font-size: 12px; line-height: 1.4; }
      .commentAuthor { font-weight: 700; margin-right: 4px; }
      .commentTime { font-size: 11px; opacity: 0.5; margin-left: 6px; }

      .commentDeleteBtn {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 11px;
        opacity: 0.4;
        padding: 0 4px;
        margin-left: 4px;
        vertical-align: middle;
      }

      .commentDeleteBtn:hover { opacity: 1; }

      .commentInputRow {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .commentInput {
        flex: 1;
        padding: 7px 10px;
        border-radius: 10px;
        border: 1px solid rgba(0,0,0,0.15);
        font-size: 12px;
        outline: none;
        font-family: inherit;
      }

      .commentInput:focus { border-color: rgba(0,0,0,0.3); }

      .commentSubmit {
        padding: 7px 12px;
        border-radius: 10px;
        border: none;
        background: black;
        color: white;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
      }

      .charCount {
        font-size: 11px;
        opacity: 0.4;
        white-space: nowrap;
        min-width: 24px;
        text-align: right;
      }

      /* ---------- GLOBAL BUTTONS ---------- */

      #status {
        font-size: 12px;
        opacity: 0.7;
        margin-top: 10px;
      }

      button {
        border: 0;
        border-radius: 12px;
        padding: 10px 12px;
        font-weight: 700;
        cursor: pointer;
        background: black;
        color: white;
      }

      #logoutBtn {
        background: white;
        color: red;
        border: 1px solid rgba(0,0,0,0.15);
      }

      #logoutBtn:hover { background: #ffecec; }
    </style>
  </head>

  <body>
    <div class="layout">

      <!-- MAIN FEED -->
      <div class="main">
        <div class="topbar">
          <div class="brandBlock">
            <img src="losslesslogo.png" alt="Lossless logo" class="logo" />
            <div class="subtitle">Your feed</div>
          </div>
          <div class="topActions">
            <button id="refreshBtn">Refresh</button>
            <button id="logoutBtn">Log out</button>
          </div>
        </div>

        <div id="emptyState" class="emptyState" style="display:none;">
          No posts yet. Add some friends and share a track to get started.
        </div>

        <div id="list"></div>
        <div id="status"></div>
      </div>

      <!-- RIGHT PANEL -->
      <div class="leftPanel" id="leftPanel" style="display:none;">

        <!-- Add Friends -->
        <div class="panelCard">
          <div class="panelTitle">Friends</div>
          <button class="addFriendBtn" id="addFriendBtn">+ Add Friend</button>
          <div class="searchPanel" id="searchPanel">
            <input class="friendSearchInput" id="friendSearchInput" type="text" placeholder="Enter Friend Code…" />
            <div class="searchResults" id="searchResults"></div>
          </div>
          <div id="friendsList" style="margin-top:10px;"></div>
        </div>

        <!-- Pending Requests -->
        <div class="panelCard" id="requestsCard" style="display:none;">
          <div class="panelTitle">Friend Requests</div>
          <div id="requestsList"></div>
        </div>

      </div>

    </div>

    <script src="feed.js"></script>
  </body>
</html>
