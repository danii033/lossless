<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Lossless Login</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f7f7f7;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
      }

      .card {
        background: white;
        padding: 24px;
        border-radius: 16px;
        width: 320px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.12);
        text-align: center;
      }

      h2 { margin-top: 0; margin-bottom: 6px; }

      p {
        font-size: 13px;
        opacity: 0.7;
        margin-bottom: 16px;
      }

      button {
        width: 100%;
        padding: 12px;
        border-radius: 14px;
        border: 0;
        background: black;
        color: white;
        font-weight: 700;
        cursor: pointer;
      }

      #msg {
        margin-top: 12px;
        font-size: 12px;
        opacity: 0.7;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h2>Lossless</h2>
      <p>Log in to share what you are listening to</p>
      <button id="loginBtn">Login with Google</button>
      <div id="msg"></div>
    </div>

    <!-- No inline scripts allowed in MV3 — logic lives in login.js -->
    <script src="login.js" type="module"></script>
  </body>
</html>
