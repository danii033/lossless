<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Lossless</title>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
      }

      #wrap {
        width: 320px;
        padding: 14px;
        box-sizing: border-box;
      }

      #brand {
        font-size: 16px;
        font-weight: 700;
        margin-bottom: 2px;
      }

      #sub {
        font-size: 12px;
        opacity: 0.7;
        margin-bottom: 10px;
      }

      #userBlock {
        display: none;
        margin-bottom: 10px;
      }

      #userBadge {
        font-size: 12px;
        font-weight: 700;
        padding: 6px 10px;
        border-radius: 999px;
        background: #f2f2f2;
        text-align: center;
        margin-bottom: 6px;
      }

      #resetBtn {
        width: 100%;
        padding: 7px;
        border-radius: 10px;
        border: 1px solid rgba(0,0,0,0.2);
        background: white;
        font-size: 11px;
        font-weight: 700;
        cursor: pointer;
        color: red;
      }

      #card {
        border: 1px solid rgba(0,0,0,0.12);
        border-radius: 12px;
        padding: 12px;
        margin-bottom: 12px;
      }

      #track {
        font-size: 14px;
        font-weight: 700;
        margin-bottom: 6px;
      }

      #artist {
        font-size: 12px;
        opacity: 0.85;
        margin-bottom: 6px;
      }

      #service {
        font-size: 11px;
        opacity: 0.6;
      }

      button {
        width: 100%;
        padding: 11px;
        border-radius: 14px;
        border: 0;
        font-weight: 700;
        cursor: pointer;
      }

      #shareBtn {
        background: black;
        color: white;
      }

      #shareBtn:disabled {
        opacity: 0.6;
        cursor: default;
      }

      #loginBtn,
      #feedBtn {
        background: white;
        border: 1px solid rgba(0,0,0,0.14);
        margin-top: 10px;
      }

      #status {
        margin-top: 10px;
        font-size: 11px;
        opacity: 0.7;
        text-align: center;
      }
    </style>
  </head>

  <body>
    <div id="wrap">
      <div id="brand">Lossless</div>
      <div id="sub">Track preview</div>

      <div id="userBlock">
        <div id="userBadge"></div>
        <button id="resetBtn">Logout</button>
      </div>

      <div id="card">
        <div id="track">Open a track page</div>
        <div id="artist"></div>
        <div id="service"></div>
      </div>

      <button id="shareBtn" disabled>Share</button>
      <button id="loginBtn">Login</button>
      <button id="feedBtn">View feed</button>

      <div id="status"></div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
