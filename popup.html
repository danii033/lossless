<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Lossless</title>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
      }

      #wrap {
        width: 320px;
        padding: 14px;
        box-sizing: border-box;
      }

      #brand {
        font-weight: 700;
        margin-bottom: 2px;
      }

      #sub {
        font-size: 12px;
        opacity: 0.7;
        margin-bottom: 10px;
      }

      #userBadge {
        font-size: 11px;
        background: #f0f0f0;
        padding: 6px 8px;
        border-radius: 8px;
        margin-bottom: 10px;
        display: none;
      }

      #card {
        border: 1px solid rgba(0,0,0,0.12);
        border-radius: 12px;
        padding: 12px;
        margin-bottom: 12px;
      }

      #track {
        font-weight: 700;
        margin-bottom: 6px;
      }

      #artist {
        font-size: 12px;
        opacity: 0.8;
      }

      button {
        width: 100%;
        padding: 11px;
        border-radius: 14px;
        border: 0;
        font-weight: 700;
        cursor: pointer;
        margin-top: 10px;
      }

      #shareBtn {
        background: black;
        color: white;
      }

      #loginBtn,
      #feedBtn {
        border: 1px solid rgba(0,0,0,0.14);
        background: white;
      }

      #status {
        font-size: 11px;
        opacity: 0.7;
        margin-top: 10px;
      }
    </style>
  </head>

  <body>
    <div id="wrap">
      <div id="brand">Lossless</div>
      <div id="sub">Track preview</div>

      <div id="userBadge"></div>

      <div id="card">
        <div id="track">Open a track page</div>
        <div id="artist"></div>
      </div>

      <button id="shareBtn" disabled>Share</button>
      <button id="feedBtn">View feed</button>
      <button id="loginBtn">Login</button>


      <div id="status"></div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
