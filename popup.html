<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Lossless</title>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
      }

      #wrap {
        width: 320px;
        padding: 14px;
        box-sizing: border-box;
      }

      #header {
        margin-bottom: 12px;
      }

      #brand {
        font-size: 16px;
        font-weight: 700;
        margin-bottom: 2px;
      }

      #sub {
        font-size: 12px;
        opacity: 0.7;
      }

      #card {
        border: 1px solid rgba(0, 0, 0, 0.12);
        border-radius: 12px;
        padding: 12px;
        margin-bottom: 12px;
      }

      #track {
        font-size: 14px;
        font-weight: 700;
        line-height: 1.25;
        margin-bottom: 6px;

        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        }

      #artist {
        font-size: 12px;
        opacity: 0.85;
        margin-bottom: 6px;

        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      #service {
        font-size: 11px;
        opacity: 0.6;
      }

      #shareBtn {
        width: 100%;
        padding: 11px;
        border-radius: 14px;
        border: 0;
        font-weight: 700;
        cursor: pointer;
        background: black;
        color: white;
        
      }

      #shareBtn:hover:not(:disabled) {
        transform: scale(1.04);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
      }

      #shareBtn:disabled {
        opacity: 0.6;
        cursor: default;
      }

      #loginBtn {
        width: 100%;
        padding: 11px;
        border-radius: 14px;
        border: 1px solid rgba(0,0,0,0.14);
        background: white;
        font-weight: 700;
        cursor: pointer;
        margin-top: 10px;
      }

      #loginBtn:hover {
        transform: scale(1.02);
      }

      #feedBtn {
        width: 100%;
        padding: 11px;
        border-radius: 14px;
        border: 1px solid rgba(0,0,0,0.14);
        background: white;
        font-weight: 700;
        cursor: pointer;
        margin-top: 10px;
      }

      #feedBtn:hover {
        transform: scale(1.02);
      }

      #status {
        margin-top: 10px;
        font-size: 11px;
        opacity: 0.7;
      }

      #logoutBtn {
        background: transparent;
        color: rgb(255, 0, 0);
        border: 1px solid rgba(0,0,0,0.15);
        width: 100%;
        padding: 11px;
        border-radius: 14px;
        border: 1px solid rgba(0,0,0,0.14);
        background: white;
        font-weight: 700;
        cursor: pointer;
        margin-top: 10px;
      }

      #logoutBtn:hover {
        transform: scale(1.02);
      }

    </style>
  </head>

  <body>
    <div id="wrap">
      <div id="header">
        <div id="brand">Lossless</div>
        <div id="sub">Track preview</div>
      </div>

      <div id="card">
        <div id="track">Open a track page</div>
        <div id="artist"></div>
        <div id="service"></div>
      </div>

      <button id="shareBtn" disabled>Share</button>
      <button id="loginBtn">Login</button>
      <button id="feedBtn">View feed</button>
      <button id="logoutBtn" style="display:none;">Sign out</button>



      <div id="status"></div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
